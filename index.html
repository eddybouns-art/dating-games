<!doctype html>
<html lang="de">

<head>
  <meta charset="utf-8" />
  <title>Herzrasen: Kitsch-Quest</title>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#ff7ab6" />

  <style>
    html,
    body {
      margin: 0;
      background: #1a1423;
      height: 100%;
      overflow: hidden;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    #game {
      display: block;
      image-rendering: pixelated;

      border: 4px solid #ff7ab6;
      border-radius: 12px;

      box-shadow: 0 0 30px rgba(255, 122, 182, 0.4);
    }

    .credits {
      position: fixed;
      left: 8px;
      bottom: 8px;

      color: #ffcbe6;

      font-family: monospace;
      font-size: 12px;

      background: rgba(26, 20, 35, 0.8);

      padding: 6px 8px;

      border-radius: 6px;

      border: 1px solid #ff7ab6;
    }
  </style>
</head>

<body>

  <canvas id="game"></canvas>

  <div class="credits">
    Herzrasen v1 • Pfeile/AD • Space • Enter • R = Neustart
  </div>

  <script type="module" src="./game.js"></script>

</body>

</html>
